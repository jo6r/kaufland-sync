apiVersion: batch/v1
kind: CronJob
metadata:
  name: jiri-models-feed
  labels:
    app: jiri-models-feed
spec:
  # Schedule: Run once daily at midnight (00:00)
  schedule: "0 0 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      activeDeadlineSeconds: 600
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: jiri-models-feed
        spec:
          imagePullSecrets:
          - name: registry-secret
          restartPolicy: OnFailure
          containers:
          - name: jiri-models-feed
            image: zot.jo6r.xyz/jiri-models-feed:1.5
            imagePullPolicy: Always
            command: ["python", "main.py"]
            env:
            - name: DB_DSN
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: dsn
            - name: JIRI_MODELS_FEED_URL
              valueFrom:
                configMapKeyRef:
                  name: jiri-models-feed
                  key: feed-url
            resources:
              requests:
                memory: "128Mi"
                cpu: "100m"
              limits:
                memory: "512Mi"
                cpu: "500m"
