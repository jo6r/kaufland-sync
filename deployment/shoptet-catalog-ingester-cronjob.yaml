apiVersion: batch/v1
kind: CronJob
metadata:
  name: shoptet-catalog-ingester
  labels:
    app: shoptet-catalog-ingester
spec:
  # Schedule: At minute 0 past every 2nd hour.
  schedule: "0 */2 * * *"
  # Keep last 3 successful jobs
  successfulJobsHistoryLimit: 3
  # Keep last 1 failed job
  failedJobsHistoryLimit: 1
  # Job will be considered failed if not completed within 10 minutes
  jobTemplate:
    spec:
      # Job timeout
      activeDeadlineSeconds: 600
      # Retry policy
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: shoptet-catalog-ingester
        spec:
          imagePullSecrets:
          - name: registry-secret
          restartPolicy: OnFailure
          containers:
          - name: ingester
            image: zot.jo6r.xyz/shoptet-catalog-ingester:1.9
            imagePullPolicy: Always
            command: ["python", "main.py"]
            env:
            - name: DB_DSN
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: dsn
            - name: SHOPTET_CSV_URL
              valueFrom:
                configMapKeyRef:
                  name: shoptet-catalog-ingester
                  key: csv-url
            - name: IGNORE_CODES
              valueFrom:
                configMapKeyRef:
                  name: shoptet-catalog-ingester
                  key: ignore-codes
            resources:
              requests:
                memory: "128Mi"
                cpu: "100m"
              limits:
                memory: "512Mi"
                cpu: "500m"
